name: Deploy — Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has_cf: ${{ steps.check.outputs.has_cf }}
    steps:
      - id: check
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CF_TOKEN" ] && [ -n "$CF_ACCOUNT" ]; then
            echo "has_cf=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_cf=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Cloudflare secret'leri tanımsız — deploy atlanıyor. Sadece build edilecek."
          fi

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Bağımlılıkları Yükle
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.SITE_URL || 'https://vektorelbakisi.com' }}

      - name: Build Artifact Yükle
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: out/
          retention-days: 7

  deploy:
    needs: [check-secrets, build]
    if: needs.check-secrets.outputs.has_cf == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Artifact İndir
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: out/

      - name: Cloudflare Pages'e Deploy Et
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: vektorel-bakisi
          directory: out
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
